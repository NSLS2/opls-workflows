name: prefect-docker-pixi-tiled-opls
prefect-version: 3.4.18

build: null

push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /repo
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/NSLS2/opls-workflows.git
      branch: main

deployments:
  - name: opls-end-of-run-workflow-docker
    version: 0.1.1
    tags:
      - opls
      - smi
      - main
    description: Deploy the updated Docker image
    entrypoint: end_of_run_workflow.py:end_of_run_workflow
    parameters: {}
    schedule: {}
    work_pool:
      job_variables:
        env:
          TILED_SITE_PROFILES: /nsls2/software/etc/tiled/profiles
        image: ghcr.io/nsls2/opls-workflows:main
        image_pull_policy: Always
        network: slirp4netns
        volumes:
          - /nsls2/data/smi/proposals:/nsls2/data/smi/proposals
          - /nsls2/software/etc/tiled:/nsls2/software/etc/tiled
        container_create_kwargs:
          userns_mode: "keep-id:uid=402959,gid=402959"  # workflow-smi:workflow-smi
        auto_remove: true
      name: opls-work-pool-docker
